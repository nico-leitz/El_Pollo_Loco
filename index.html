<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>El Pollo Loco</title>
</head>
<body>

  <div id="canvas_container" class="canvas-container"> 

    <button id="fullscreen_btn">Fullscreen</button>

    <button id="mute_btn" onclick="toggleMuteBtn()">
        <img id="mute_icon" src="img/volume-up.png" alt="mute button">
    </button>

    <img id="start_screen" src="img/9_intro_outro_screens/start/startscreen_2.png" alt="start screen">
    
    <div id="game_controls" class="game_controls">
        <button id="start_game_btn">Start Game!</button>
        <button id="controll_btn">Controls</button>
    </div>

    <img id="game_over_screen" class="d_none" src="img/You won, you lost/Game Over.png" alt="game over screen">
    <div id="game_over_menu" class="d_none"> <button id="game_over_restart_btn" class="menu_btn">Try Again!</button>
        <button id="game_over_home_btn" class="menu_btn">Back to Menu</button>
    </div>

    <img id="win_screen" class="d_none" src="img/You won, you lost/You Win A.png" alt="win screen">
    <div id="win_menu" class="d_none"> <button id="win_restart_btn" class="menu_btn">Try Again!</button>
        <button id="win_home_btn" class="menu_btn">Back to Menu</button>
    </div>
    
    <div id="controll_panel" class="panel-backdrop d_none">
        <div class="control-panel">
            <h2>Controls</h2>
            
            <div class="control-row">
                <span class="control-desc">Move</span>
                <div class="keys">
                    <kbd>A</kbd>
                    <span class="separator">/</span>
                    <kbd>D</kbd>
                </div>
            </div>

            <div class="control-row">
                <span class="control-desc">Jump</span>
                <div class="keys">
                    <kbd class="space-key">SPACE</kbd>
                </div>
            </div>

            <div class="control-row">
                <span class="control-desc">Throw Bottle</span>
                <div class="keys">
                    <kbd>D</kbd>
                </div>
            </div>

            <button id="close_controll_btn">Got it!</button>
        </div>
    </div>

    <div id="orientation_overlay">
        <span>Please rotate device 🔄</span>
    </div>
    
    <div id="mobile_controls" class="d_none">
        <div class="control-btn-group left-group">
            <button id="btn_left">◀</button>
            <button id="btn_right">▶</button>
        </div>
        <div class="control-btn-group right-group">
            <button id="btn_jump">▲</button>
            <button id="btn_throw">🍾</button>
        </div>
    </div>
    
    <canvas id="canvas" width="720" height="480"></canvas>
  </div>

  <div class="game_footer">
      <a href="imprint.html">Imprint</a>
  </div>

    <script src="js/functions.js"></script>
    <script src="models/audio-manager.class.js"></script>
    <script src="models/audio-error.class.js"></script>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/moveable-objects.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/endboss-health-bar.class.js"></script>
    <script src="models/health-bar.class.js"></script>
    <script src="models/coin-bar.class.js"></script>
    <script src="models/bottle-bar.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/non-moveable-objects.class.js"></script>
    <script src="models/collectable-objects.class.js"></script>
    <script src="models/coin-objects.class.js"></script>
    <script src="models/bottle-objects.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
